services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  label-studio:
    image: heartexlabs/label-studio:1.13.1
    environment:
      LABEL_STUDIO_BASE_DATA_DIR: /label-studio/data
      LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED: "true"
      LABEL_STUDIO_HOST: https://biolit-labelstudio.services.d4g.fr
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - labelstudio_data:/label-studio/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.biolit-labelstudio.rule=Host(`biolit-labelstudio.services.d4g.fr`)
      - traefik.http.routers.biolit-labelstudio.entryPoints=webtls
      - traefik.http.routers.biolit-labelstudio.tls=true
      - traefik.docker.network=d4g-internal
      - traefik.http.services.biolit-labelstudio.loadbalancer.server.port=8080

  rustfs:
    image: 'rustfs/rustfs:latest'
    restart: unless-stopped
    ports:
      - 9000
      - 9001
    environment:
      RUSTFS_ACCESS_KEY: '${AWS_ACCESS_KEY_ID:-minioadmin}'
      RUSTFS_SECRET_KEY: '${AWS_SECRET_ACCESS_KEY:-minioadmin}'
      RUSTFS_CONSOLE_ENABLE: 'true'
    command:
      - '--console-enable'
      - /data
    volumes:
      - './rustfs_data:/data'
    healthcheck:
      test:
        - CMD-SHELL
        - "wget --server-response -qO /dev/null http://localhost:9000/minio/health/live 2>&1 | grep -qE 'HTTP/1\\.[01] (200|403)'"
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
  rustfs-init:
    image: 'amazon/aws-cli:latest'
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - '-c'
    command:
      - "aws s3 mb s3://$${AWS_STORAGE_BUCKET_NAME} --endpoint-url http://rustfs:9000 2>/dev/null || true\necho \"Bucket ready.\"\n"
    environment:
      AWS_ACCESS_KEY_ID: '${AWS_ACCESS_KEY_ID}'
      AWS_SECRET_ACCESS_KEY: '${AWS_SECRET_ACCESS_KEY}'
      AWS_STORAGE_BUCKET_NAME: '${AWS_STORAGE_BUCKET_NAME}'

volumes:
  postgres_data:
  labelstudio_data:

networks:
  default:
    name: biolit_network