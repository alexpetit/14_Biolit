
services:
  postgres:
    image: postgres:15
    container_name: biolit-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  pipeline:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: biolit-pipeline
    depends_on:
      - postgres
    environment:
      POSTGRES_URL: ${POSTGRES_URL}
      BIOLIT_API_URL: ${BIOLIT_API_URL}
    command: ["uv", "run", "python", "-m", "pipelines.run"]

  label-studio:
    image: heartexlabs/label-studio:1.13.1
    container_name: biolit-label-studio
    ports:
      - "8089:8080"
    environment:
      LABEL_STUDIO_BASE_DATA_DIR: /label-studio/data
      LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED: "true"
      LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT: /label-studio/files
      LABEL_STUDIO_HOST: http://localhost:8089
      LABEL_STUDIO_INTERNAL_HOST: http://label-studio:8080
    volumes:
      - ../data/label-studio:/label-studio/data
      - ../data/label-studio/files:/label-studio/files:ro

volumes:
  postgres_data:
